name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned, labeled]
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude') || contains(github.event.label.name, 'claude'))) ||
      (github.event_name == 'pull_request' && (contains(github.event.pull_request.body, '@claude') || contains(github.event.pull_request.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          label_trigger: 'claude'
          base_branch: 'main'
          branch_prefix: 'claude/'
          track_progress: true

          settings: |
            {
              "env": {
                "GH_TOKEN": "${{ secrets.GITHUB_TOKEN }}"
              }
            }

          prompt: |
            ## Repository Context

            This is neat-little-package, a collection of Claude Code plugins:
            - **box-factory**: Toolkit for creating Claude Code components (plugins, agents, skills, hooks)
            - **dmv**: Git and GitHub workflow preferences
            - **mr-sparkle**: Linting and autoformatting

            For Box Factory work, read the box-factory plugin's claude-components skill for component patterns and philosophy.

            ## Box Factory Philosophy (if working on box-factory plugin)

            - **Low-Maintenance First**: Skills defer to official docs via WebFetch, never hardcode model names/tool lists/syntax
            - **Two-Layer Approach**: Layer 1 = Official specs, Layer 2 = Best practices/interpretive guidance
            - **Knowledge Delta Filter**: Only document what Claude doesn't already know
            - **Evidence-Based**: Claims grounded in official docs OR clearly marked as opinions

            ## Guidelines

            - If the request is just a question, answer it without creating a PR
            - Commit with terse, single-line messages (no emojis)
            - Run appropriate tests/linting after making changes
            - DO NOT merge PRs - leave open for review
            - PR review comments are PRIMARY source of truth - read ALL previous review comments before making changes

          claude_args: >-
            --allowedTools "
            Bash(git:*),
            Bash(gh:*),
            Bash(command -v:*),
            Bash(./*),
            Read(**),
            Edit(**),
            Glob(**),
            Grep(**),
            Write(**),
            Task,
            WebFetch,
            WebSearch
            "
            --model sonnet
